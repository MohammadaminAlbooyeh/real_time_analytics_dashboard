<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #dc3545;
            margin-bottom: 20px;
        }
        p {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 30px;
            text-align: center;
        }
        form {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }
        button.delete-btn {
            background-color: #dc3545;
            color: white;
        }
        button.delete-btn:hover {
            background-color: #c82333;
        }
        button.cancel-btn {
            background-color: #6c757d;
            color: white;
        }
        button.cancel-btn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <h1>Confirm Flashcard Deletion</h1>

    <p>Are you sure you want to delete the following flashcard?</p>
    <p><strong>Question:</strong> {{ object.question }}</p>
    <p><strong>Answer:</strong> {{ object.answer }}</p>

    <form method="post">
        {% csrf_token %}
        <div class="buttons">
            <button type="submit" class="delete-btn">Yes, delete it</button>
            <button type="button" class="cancel-btn" onclick="window.history.back();">No, go back</button>
        </div>
    </form>
</body>
</html>
